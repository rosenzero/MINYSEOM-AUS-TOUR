<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1" />
  <title>오프라인 · 호주 여행</title>
  <style>
    :root { color-scheme: light dark; }
    html, body {
      margin: 0; padding: 0; height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans KR", sans-serif;
      background: #fafafa; color: #171717;
    }
    @media (prefers-color-scheme: dark) {
      html, body { background: #0a0a0a; color: #f5f5f5; }
    }
    .wrap {
      min-height: 100%; display: flex; flex-direction: column;
      align-items: center; justify-content: center; padding: 2rem; text-align: center;
    }
    .icon { width: 48px; height: 48px; color: #6366f1; }
    h1 { font-size: 20px; margin: 16px 0 6px; }
    p { font-size: 13px; color: #737373; margin: 0 0 20px; max-width: 320px; line-height: 1.5; }
    @media (prefers-color-scheme: dark) { p { color: #a3a3a3; } }
    button {
      appearance: none; border: 0; border-radius: 999px;
      background: #4f46e5; color: white; font-weight: 600;
      padding: 10px 22px; font-size: 14px; cursor: pointer;
    }
    button:active { transform: scale(0.98); }
  </style>
</head>
<body>
  <div class="wrap">
    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <path d="M1 12h22M4 8l-2 4 2 4M20 8l2 4-2 4" />
    </svg>
    <h1>오프라인 상태예요</h1>
    <p>이 페이지는 아직 캐시되지 않았어요. 네트워크에 연결되면 다시 불러올게요.</p>
    <button onclick="location.reload()">다시 시도</button>
  </div>
</body>
</html>
